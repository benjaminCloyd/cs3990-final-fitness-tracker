<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weight Tracker</title>
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

  <header>
    <div class="logo">Weight Tracker</div>
    <nav class="nav-tabs">
      <button class="nav-tab active" id="tab-sessions" onclick="showPanel('sessions', this)">Sessions</button>
      <button class="nav-tab" id="tab-progress" onclick="showPanel('progress', this)">Progress</button>
    </nav>
  </header>

  <div class="app">

    <!-- sessions -->
    <section class="panel active" id="panel-sessions">

      <aside class="sessions-sidebar">
        <div class="sidebar-header">
          <h2>WORKOUTS</h2>
        </div>

        <div class="create-form">
          <div class="form-row">
            <label>Session Name</label>
            <input type="text" id="new-session-name" placeholder="Push Day, Leg Day…">
          </div>
          <div class="form-row">
            <label>Date</label>
            <input type="text" id="new-session-date" placeholder="MM/DD/YYYY" autocomplete="off">
          </div>
          <div id="session-msg"
            style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--danger);margin-bottom:8px">
          </div>
          <button class="btn btn-primary btn-full" id="create-session-btn">+ CREATE SESSION</button>
        </div>

        <div class="session-list" id="session-list">
          <div class="empty-state">
            <p>No sessions yet.<br>Create your first workout.</p>
          </div>
        </div>
      </aside>

      <div class="session-detail">
        <div class="detail-placeholder" id="detail-placeholder">
          <p>Select a session to view</p>
        </div>
        <div class="detail-content" id="detail-content" style="display:none"></div>
      </div>

    </section>

    <!-- progress -->
    <section class="panel" id="panel-progress">

      <div class="progress-header">
        <h2>1RM PROGRESS TRACKER</h2>
        <div class="subtitle">EPLEY FORMULA: 1RM = WEIGHT × (1 + REPS ÷ 30)</div>
      </div>

      <div>
        <div class="pill-label">SELECT EXERCISE</div>
        <div class="exercise-selector" id="exercise-pills">
          <span class="muted-text">Log exercises in sessions first.</span>
        </div>
      </div>

      <div class="stat-row" id="stat-row" style="display:none"></div>

      <div class="chart-wrapper">
        <div class="no-data-chart" id="chart-placeholder">
          <span>SELECT AN EXERCISE ABOVE</span>
        </div>
        <div id="chart-content" style="display:none">
          <div class="chart-title" id="chart-title"></div>
          <div class="chart-subtitle">ESTIMATED ONE-REP MAX OVER TIME // LBS</div>
          <div class="canvas-container">
            <canvas id="progress-chart"></canvas>
          </div>
        </div>
      </div>

    </section>
  </div>

  <div id="toast"></div>

  <script src="/main.js"></script>
</body>

</html>
